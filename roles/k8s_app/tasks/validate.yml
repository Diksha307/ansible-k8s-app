---
- name: Wait For Pods To Be Running
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ namespace_name }}"
    label_selectors:
      - app={{ app_name }}
  register: pod_info
  retries: 12
  delay: 15
  until: >
    pod_info.resources | length > 0 and
    pod_info.resources | selectattr('status.phase', 'equalto', 'Running') | list | length > 0

- name: Get Deployment Info
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: "{{ app_name }}"
    namespace: "{{ namespace_name }}"
  register: deployment_info

- name: Validate Deployment Ready Replicas
  assert:
    that:
      - deployment_info.resources | length > 0
      - deployment_info.resources[0].status.readyReplicas | default(0) >= (scale_replicas | int if scale_enabled else replica_count | int)
    fail_msg: "Deployment validation failed: replicas not ready"
    success_msg: "Deployment validated successfully"

- name: Show Pod Status
  debug:
    msg: "{{ item.metadata.name }} : {{ item.status.phase }}"
  loop: "{{ pod_info.resources }}"
  loop_control:
    label: "{{ item.metadata.name }}"

- name: Verify Secret Exists
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ app_name }}-secret"
    namespace: "{{ namespace_name }}"
  register: secret_info
  no_log: true

- name: Assert secret is deployed
  assert:
    that:
      - secret_info.resources | length > 0
    fail_msg: "Secret {{ app_name }}-secret not found in namespace {{ namespace_name }}"
    success_msg: "Secret verified successfully"
